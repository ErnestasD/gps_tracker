# Orbetra APP layer (staging, W7-D) — overlay on the infra compose:
#   docker compose -f docker-compose.yml -f docker-compose.apps.yml up -d
# One image, four services (tsx entrypoints — same as dev/e2e). Secrets come from
# /opt/orbetra/.env on the server (JWT_SECRET etc.) — NEVER from this file (rule 12).
# Internal services keep loopback-only publishing (PR #11: Docker bypasses UFW);
# only Caddy (80/443) and ingest TCP (5027 — devices must reach it) face the world.

services:
  # the staging HTTP-by-IP Caddyfile block reads {$ORBETRA_STAGING_HOST} from the
  # CONTAINER env — compose .env substitution alone doesn't reach the Caddyfile
  caddy:
    environment:
      ORBETRA_STAGING_HOST: ${ORBETRA_STAGING_HOST:-staging-host.invalid}
      ORBETRA_SITE_HOST: ${ORBETRA_SITE_HOST:-site-host.invalid}
      ORBETRA_SITE_WWW: ${ORBETRA_SITE_WWW:-www-host.invalid}
      ORBETRA_APP_HOST: ${ORBETRA_APP_HOST:-app-host.invalid}

  app-base:
    build:
      context: ../..
      dockerfile: infra/docker/app.Dockerfile
    image: orbetra-app:latest
    profiles: ["build-only"] # never runs — exists so `compose build app-base` builds the shared image

  ingest:
    image: orbetra-app:latest
    command: ["tsx", "apps/ingest/src/main.ts"]
    restart: unless-stopped
    environment:
      REDIS_URL: redis://redis:6379
      INGEST_TCP_PORT: "5027"
      # UDP channel shares the port (a device picks ONE protocol); set INGEST_UDP_PORT=0 to disable
      PROMETHEUS_PORT: "9101"
    ports:
      - "5027:5027" # devices connect here (TCP) — the ONE public app port besides Caddy
      - "5027:5027/udp" # same port, UDP channel (Teltonika UDP-configured devices)
    depends_on:
      redis:
        condition: service_healthy

  worker:
    image: orbetra-app:latest
    command: ["tsx", "apps/worker/src/main.ts"]
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://postgres:${PG_PASSWORD:-orbetra_dev}@pg:5432/orbetra
      REDIS_URL: redis://redis:6379
      PROMETHEUS_PORT: "9102"
      EXPORT_DIR: /var/orbetra/exports
      WEBHOOK_DELIVERY_RETENTION_DAYS: ${WEBHOOK_DELIVERY_RETENTION_DAYS:-30}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
      # E05-5 email delivery (ADR-023) — values live in /opt/orbetra/.env (rule 12); absent ⇒ skipped
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}
      MAIL_FROM: ${MAIL_FROM:-}
      SES_CONFIG_SET: ${SES_CONFIG_SET:-}
      # Web Push (ADR-026) — VAPID_PRIVATE_KEY in /opt/orbetra/.env (rule 12); absent ⇒ webpush skipped
      VAPID_PUBLIC_KEY: ${VAPID_PUBLIC_KEY:-}
      VAPID_PRIVATE_KEY: ${VAPID_PRIVATE_KEY:-}
      VAPID_SUBJECT: ${VAPID_SUBJECT:-mailto:ops@orbetra.com}
      # Stripe overage usage reporter (ADR-024 PR B2) — values in /opt/orbetra/.env (rule 12); absent ⇒ skipped
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY:-}
      STRIPE_INCLUDED: ${STRIPE_INCLUDED:-}
      STRIPE_METER_EVENT: ${STRIPE_METER_EVENT:-orbetra_device_overage}
    volumes:
      - exports:/var/orbetra/exports
    depends_on:
      pg:
        condition: service_healthy
      redis:
        condition: service_healthy

  api:
    image: orbetra-app:latest
    command: ["tsx", "apps/api/src/main.ts"]
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://postgres:${PG_PASSWORD:-orbetra_dev}@pg:5432/orbetra
      REDIS_URL: redis://redis:6379
      JWT_SECRET: ${JWT_SECRET}
      API_PORT: "3010"
      PUBLIC_API_URL: ${PUBLIC_API_URL:-http://185.80.129.33}
      GEOCODER_URL: http://photon:2322
      TRUST_PROXY: "1"
      # staging is reachable over plain HTTP by IP until DNS lands — Secure cookies
      # would silently break login there. Flip to 1 the day TLS is on.
      COOKIE_SECURE: ${COOKIE_SECURE:-0}
      EXPORT_DIR: /var/orbetra/exports
      # Stripe billing (ADR-024) — values in /opt/orbetra/.env (rule 12); absent ⇒ billing routes 503
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY:-}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET:-}
      STRIPE_PRICES: ${STRIPE_PRICES:-}
      STRIPE_OVERAGE_MAP: ${STRIPE_OVERAGE_MAP:-}
      APP_BASE_URL: ${APP_BASE_URL:-}
      # Web Push (ADR-026) — the API serves the PUBLIC key to the browser; absent ⇒ push unavailable
      VAPID_PUBLIC_KEY: ${VAPID_PUBLIC_KEY:-}
      # OSRM route optimization (ADR-029) — empty until staging preps the osrm volume
      # (infra/osrm/README.md), then set OSRM_URL=http://osrm:5000 in /opt/orbetra/.env;
      # absent ⇒ POST /v1/routing/optimize answers 503 and the web page degrades
      OSRM_URL: ${OSRM_URL:-}
    volumes:
      # the GDPR download route streams the file the WORKER wrote — same volume on both
      # (review HIGH: without this every export download 410s "file removed")
      - exports:/var/orbetra/exports
    depends_on:
      pg:
        condition: service_healthy
      redis:
        condition: service_healthy

  prometheus:
    volumes:
      - ../prometheus/prometheus.staging.yml:/etc/prometheus/prometheus.yml:ro

  site:
    image: orbetra-app:latest
    # public marketing site (W9-S1): pre-built static dist behind Caddy
    command: ["pnpm", "--filter", "@orbetra/site", "exec", "vite", "preview", "--host", "0.0.0.0", "--port", "4174"]
    restart: unless-stopped
    environment:
      API_PROXY_TARGET: http://api:3010
    depends_on:
      - api

  web:
    image: orbetra-app:latest
    # serves the PRE-BUILT dist (vite preview — the e2e-tested path); /v1+/ws go through
    # Caddy, so the SPA never needs an absolute API origin
    command: ["pnpm", "--filter", "@orbetra/web", "exec", "vite", "preview", "--host", "0.0.0.0", "--port", "5173"]
    restart: unless-stopped
    environment:
      API_PROXY_TARGET: http://api:3010
    depends_on:
      - api

volumes:
  exports:
