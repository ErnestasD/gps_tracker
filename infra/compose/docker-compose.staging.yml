# Staging infra overrides: TLS via Caddy, GlitchTip on, services bound to localhost where
# Caddy fronts them. NOTE: the real staging APP deploy layers docker-compose.apps.yml on the
# base (see docs/runbooks/staging-app-deploy.md); this overlay only adds GlitchTip + the 80/443
# port publish + the localhost bindings, and can be combined with apps.yml.
# Usage: docker compose -f docker-compose.yml -f docker-compose.apps.yml -f docker-compose.staging.yml up -d
services:
  pg:
    ports: [] # not exposed publicly on staging

  redis:
    ports: []

  glitchtip:
    image: glitchtip/glitchtip:latest
    environment:
      DATABASE_URL: postgresql://postgres:${PG_PASSWORD}@pg:5432/glitchtip
      REDIS_URL: redis://redis:6379/1
      SECRET_KEY: ${GLITCHTIP_SECRET_KEY}
      EMAIL_URL: ${GLITCHTIP_EMAIL_URL:-consolemail://}
      GLITCHTIP_DOMAIN: ${GLITCHTIP_DOMAIN}
    depends_on:
      pg:
        condition: service_healthy
      redis:
        condition: service_healthy

  caddy:
    ports:
      - '80:80'
      - '443:443'
    volumes:
      # base compose already mounts ../Caddyfile; re-stated here so the staging TLS/site blocks
      # (ORBETRA_STAGING_HOST http:// + on-demand https://) front the 80/443 publish above.
      - ../Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
