# PROJECT_PLAN §5 / E01-2: allow 22, 80, 443, 5027 (Teltonika ingest); deny the rest
- name: Allow SSH
  community.general.ufw: { rule: allow, port: '22', proto: tcp }
- name: Allow HTTP
  community.general.ufw: { rule: allow, port: '80', proto: tcp }
- name: Allow HTTPS
  community.general.ufw: { rule: allow, port: '443', proto: tcp }
- name: Allow Teltonika ingest
  community.general.ufw: { rule: allow, port: '5027', proto: tcp }
- name: Enable UFW deny-by-default
  community.general.ufw: { state: enabled, policy: deny }
