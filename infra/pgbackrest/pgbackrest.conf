# pgBackRest config (W7-S2). Mounted read-only at /etc/pgbackrest/pgbackrest.conf in the
# pg container (pgBackRest 2.58 is bundled in the timescaledb-ha image).
#
# PROD SWAP (founder-gated, like SES): move the repo OFF-BOX to a Hetzner Storage Box so a
# host failure doesn't take the backups with it. Replace the [global] repo1-* below with:
#   repo1-type=sftp
#   repo1-sftp-host=<uXXXXXX.your-storagebox.de>
#   repo1-sftp-host-user=<uXXXXXX>
#   repo1-sftp-host-key-hash-type=sha256
#   repo1-path=/orbetra-pgbackrest
#   repo1-sftp-private-key-file=/etc/pgbackrest/storagebox_ed25519
# A local repo on the same disk is NOT disaster recovery — it is only enough for the
# W7-S2 restore drill (proves the mechanism + RTO).

[global]
repo1-path=/var/lib/pgbackrest
repo1-retention-full=2
repo1-retention-archive=2
repo1-retention-archive-type=full
repo1-bundle=y
compress-type=zst
compress-level=3
process-max=2
log-level-console=info
log-level-file=detail
start-fast=y

[global:archive-push]
compress-level=3

[orbetra]
pg1-path=/home/postgres/pgdata/data
