# Orbetra alert rules (W7-S1, PROJECT_PLAN §8). Metric names are the ones the apps
# actually emit (apps/{ingest,worker}/src/prom.ts) — verified, not guessed. Routed to
# the founders' Telegram via Alertmanager (infra/alertmanager/).
groups:
  - name: pipeline
    rules:
      # Redis Streams backlog: MAXLEN ~100k/shard (§5). 50% sustained = consumers
      # falling behind; near the cap = imminent backpressure / data-loss risk.
      - alert: StreamDepthHigh
        expr: max(stream_depth) > 50000
        for: 5m
        labels: { severity: warning, component: stream_depth }
        annotations:
          summary: "Redis stream depth high ({{ $value | humanize }})"
          description: "A shard backlog has exceeded 50k for 5m — consumers are falling behind. Check worker health / lease ownership."
      - alert: StreamDepthCritical
        expr: max(stream_depth) > 90000
        for: 2m
        labels: { severity: critical, component: stream_depth }
        annotations:
          summary: "Redis stream depth CRITICAL ({{ $value | humanize }})"
          description: "A shard is near the 100k MAXLEN cap — backpressure/eviction imminent. Scale or restart workers now."

      # pipeline_lag_ms: age of the oldest unprocessed record. >30s risks the trip &
      # GDPR-erase guards (both assume lag << their windows).
      - alert: PipelineLagHigh
        expr: max(pipeline_lag_ms) > 30000
        for: 5m
        labels: { severity: warning, component: pipeline_lag }
        annotations:
          summary: "Pipeline lag > 30s ({{ $value | humanize }}ms)"
          description: "Oldest unprocessed record is >30s old for 5m. Trip/geofence/GDPR guards assume lag << their windows."
      - alert: PipelineLagCritical
        expr: max(pipeline_lag_ms) > 120000
        for: 2m
        labels: { severity: critical, component: pipeline_lag }
        annotations:
          summary: "Pipeline lag CRITICAL ({{ $value | humanize }}ms)"
          description: "Lag >2m — do NOT run GDPR erase (60m guard assumes lag << 60m). Investigate the worker."

      # sudden CRC/structure failures = protocol drift or a misbehaving device fleet.
      - alert: ParseFailSpike
        expr: rate(ingest_parse_fail_total[5m]) > 5
        for: 10m
        labels: { severity: warning }
        annotations:
          summary: "Ingest parse-fail spike ({{ $value | humanize }}/s)"
          description: "CRC/structure failures >5/s for 10m — protocol drift or corrupt-frame flood. Check a capture."

      # p99 ACK latency SLA (§5: p99 < 250 ms).
      - alert: AckLatencyHigh
        expr: histogram_quantile(0.99, sum(rate(ack_latency_ms_bucket[5m])) by (le)) > 250
        for: 5m
        labels: { severity: warning }
        annotations:
          summary: "ACK p99 latency > 250ms"
          description: "Ingest p99 ACK latency breached the §5 SLA (250ms) for 5m."

      # I4 backpressure sustained = a shard can't drain.
      - alert: BackpressureSustained
        expr: max(ingest_paused_sockets) > 0
        for: 10m
        labels: { severity: warning }
        annotations:
          summary: "Sockets paused by backpressure for 10m"
          description: "ingest_paused_sockets > 0 sustained — a shard is not draining. Check worker throughput."

  - name: backups
    rules:
      # archive_mode=on (W7-S2): if archive-push fails, WAL piles up in pg_wal → disk fills
      # → PG stops accepting writes. Watch the archiver's failure counter directly, not just
      # the whole-disk alert (which fires late and never names the cause).
      - alert: WalArchiveFailing
        expr: rate(pg_stat_archiver_failed_count[5m]) > 0
        for: 15m
        labels: { severity: critical, component: backups }
        annotations:
          summary: "WAL archiving is FAILING"
          description: "pg_stat_archiver failed_count is rising — archive-push can't reach the repo. WAL will accumulate in pg_wal and eventually stop writes. First response: set archive_command to /bin/true to keep the DB up, then fix the repo (see w7-pgbackrest runbook)."
      # WAL backing up locally is the early symptom, independent of the whole root FS.
      - alert: WalDirGrowing
        expr: pg_stat_archiver_last_archived_time != 0 and (time() - pg_stat_archiver_last_archived_time) > 900
        for: 15m
        labels: { severity: warning, component: backups }
        annotations:
          summary: "No WAL archived in >15m"
          description: "The newest archived WAL segment is >15m old — archiving may be stuck. Check pgbackrest + repo reachability."

  - name: infra
    rules:
      - alert: TargetDown
        expr: up{job=~"ingest|worker|api"} == 0
        for: 2m
        labels: { severity: critical }
        annotations:
          summary: "{{ $labels.job }} is DOWN"
          description: "Prometheus can't scrape {{ $labels.job }} for 2m — the service is down or unreachable."

      - alert: DiskFillingUp
        expr: node_filesystem_avail_bytes{mountpoint="/"} / node_filesystem_size_bytes{mountpoint="/"} < 0.15
        for: 10m
        labels: { severity: warning, component: disk }
        annotations:
          summary: "Disk < 15% free ({{ $value | humanizePercentage }})"
          description: "Root filesystem below 15% — the positions hypertable grows continuously. Plan retention / capacity."
      - alert: DiskCritical
        expr: node_filesystem_avail_bytes{mountpoint="/"} / node_filesystem_size_bytes{mountpoint="/"} < 0.05
        for: 5m
        labels: { severity: critical, component: disk }
        annotations:
          summary: "Disk < 5% free ({{ $value | humanizePercentage }})"
          description: "Root filesystem critically low — writes will start failing. Act now."

      # Caddy auto-renews; this is the safety net if renewal silently fails.
      - alert: CertExpiringSoon
        # probe_ssl_earliest_cert_expiry is 0 when TLS can't be established — guard against
        # 0-time() firing a false 'cert expiring' during an outage (review HIGH)
        expr: (probe_ssl_earliest_cert_expiry > 0) and (probe_ssl_earliest_cert_expiry - time() < 14 * 24 * 3600)
        for: 1h
        labels: { severity: warning }
        annotations:
          summary: "TLS cert for {{ $labels.instance }} expires in <14d"
          description: "Caddy should auto-renew; if this fires, renewal failed. Check the caddy container logs."
