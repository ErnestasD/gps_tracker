
rule_files:
  - alerts.yml

alerting:
  alertmanagers:
    - static_configs:
        - targets: ['alertmanager:9093']

# Prometheus scrape config (E01-2). App metric targets (ingest/worker/api) register
# in E02-5 when the metrics endpoints exist; names are frozen in Appendix A.
global:
  scrape_interval: 15s

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets: ['localhost:9090']
  # app targets (E02-5; frozen metric names per Appendix A). host.docker.internal
  # reaches apps running on the host during local dev; staging runs apps in-compose.
  - job_name: ingest
    static_configs:
      - targets: ['ingest:9101']
  - job_name: worker
    static_configs:
      - targets: ['worker:9102']
  - job_name: api
    metrics_path: /metrics
    static_configs:
      - targets: ['api:3010']

  # W7-S1: host + TLS exporters
  - job_name: node
    static_configs:
      - targets: ['node-exporter:9100']
  - job_name: blackbox-tls
    metrics_path: /probe
    params: { module: [https_2xx] }
    static_configs:
      - targets: ['https://orbetra.com', 'https://dash.orbetra.com']
    relabel_configs:
      - source_labels: [__address__]
        target_label: __param_target
      - source_labels: [__param_target]
        target_label: instance
      - target_label: __address__
        replacement: blackbox-exporter:9115
