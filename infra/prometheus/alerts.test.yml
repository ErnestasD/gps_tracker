# promtool unit tests for the alert rules (W7-S1). Pin the image so humanize() is stable:
# docker run --rm --entrypoint promtool prom/prometheus:v3.1.0 test rules alerts.test.yml
rule_files:
  - alerts.yml
evaluation_interval: 1m
tests:
  - interval: 1m
    input_series:
      - series: 'stream_depth{shard="3"}'
        values: '60000+0x10'
    alert_rule_test:
      - eval_time: 6m
        alertname: StreamDepthHigh
        exp_alerts:
          - exp_labels: { severity: warning, component: stream_depth }
            exp_annotations:
              summary: "Redis stream depth high (60k)"
              description: "A shard backlog has exceeded 50k for 5m — consumers are falling behind. Check worker health / lease ownership."
      - eval_time: 6m
        alertname: StreamDepthCritical
        exp_alerts: []

  - interval: 1m
    input_series:
      - series: 'stream_depth{shard="3"}'
        values: '95000+0x5'
    alert_rule_test:
      - eval_time: 3m
        alertname: StreamDepthCritical
        exp_alerts:
          - exp_labels: { severity: critical, component: stream_depth }
            exp_annotations:
              summary: "Redis stream depth CRITICAL (95k)"
              description: "A shard is near the 100k MAXLEN cap — backpressure/eviction imminent. Scale or restart workers now."

  - interval: 1m
    input_series:
      - series: 'pipeline_lag_ms'
        values: '45000+0x10'
    alert_rule_test:
      - eval_time: 6m
        alertname: PipelineLagHigh
        exp_alerts:
          - exp_labels: { severity: warning, component: pipeline_lag }
            exp_annotations:
              summary: "Pipeline lag > 30s (45kms)"
              description: "Oldest unprocessed record is >30s old for 5m. Trip/geofence/GDPR guards assume lag << their windows."

  - interval: 1m
    input_series:
      - series: 'pipeline_lag_ms'
        values: '1000+0x10'
    alert_rule_test:
      - eval_time: 6m
        alertname: PipelineLagHigh
        exp_alerts: []

  - interval: 1m
    input_series:
      - series: 'ingest_parse_fail_total'
        values: '0+600x20'
    alert_rule_test:
      - eval_time: 16m
        alertname: ParseFailSpike
        exp_alerts:
          - exp_labels: { severity: warning }
            exp_annotations:
              summary: "Ingest parse-fail spike (10/s)"
              description: "CRC/structure failures >5/s for 10m — protocol drift or corrupt-frame flood. Check a capture."

  # ACK p99 latency: all observations land in the 250–500ms bucket → p99 > 250
  - interval: 1m
    input_series:
      - series: 'ack_latency_ms_bucket{le="1"}'
        values: '0+0x10'
      - series: 'ack_latency_ms_bucket{le="250"}'
        values: '0+0x10'
      - series: 'ack_latency_ms_bucket{le="500"}'
        values: '0+10x10'
      - series: 'ack_latency_ms_bucket{le="1000"}'
        values: '0+10x10'
      - series: 'ack_latency_ms_bucket{le="+Inf"}'
        values: '0+10x10'
    alert_rule_test:
      - eval_time: 6m
        alertname: AckLatencyHigh
        exp_alerts:
          - exp_labels: { severity: warning }
            exp_annotations:
              summary: "ACK p99 latency > 250ms"
              description: "Ingest p99 ACK latency breached the §5 SLA (250ms) for 5m."

  # sustained backpressure
  - interval: 1m
    input_series:
      - series: 'ingest_paused_sockets'
        values: '1+0x12'
    alert_rule_test:
      - eval_time: 11m
        alertname: BackpressureSustained
        exp_alerts:
          - exp_labels: { severity: warning }
            exp_annotations:
              summary: "Sockets paused by backpressure for 10m"
              description: "ingest_paused_sockets > 0 sustained — a shard is not draining. Check worker throughput."

  - interval: 1m
    input_series:
      - series: 'node_filesystem_avail_bytes{mountpoint="/"}'
        values: '10+0x15'
      - series: 'node_filesystem_size_bytes{mountpoint="/"}'
        values: '100+0x15'
    alert_rule_test:
      - eval_time: 11m
        alertname: DiskFillingUp
        exp_alerts:
          - exp_labels: { severity: warning, component: disk, mountpoint: "/" }
            exp_annotations:
              summary: "Disk < 15% free (10%)"
              description: "Root filesystem below 15% — the positions hypertable grows continuously. Plan retention / capacity."
      - eval_time: 11m
        alertname: DiskCritical
        exp_alerts: []

  - interval: 1m
    input_series:
      - series: 'up{job="worker"}'
        values: '0+0x5'
    alert_rule_test:
      - eval_time: 3m
        alertname: TargetDown
        exp_alerts:
          - exp_labels: { severity: critical, job: worker }
            exp_annotations:
              summary: "worker is DOWN"
              description: "Prometheus can't scrape worker for 2m — the service is down or unreachable."

  # cert 5 days out → FIRES (time() at eval 2h = 7200; expiry 7200 + 5d)
  - interval: 1m
    input_series:
      - series: 'probe_ssl_earliest_cert_expiry{instance="https://orbetra.com"}'
        values: '439200+0x65'
    alert_rule_test:
      - eval_time: 61m
        alertname: CertExpiringSoon
        exp_alerts:
          - exp_labels: { severity: warning, instance: "https://orbetra.com" }
            exp_annotations:
              summary: "TLS cert for https://orbetra.com expires in <14d"
              description: "Caddy should auto-renew; if this fires, renewal failed. Check the caddy container logs."

  # probe FAILURE (metric = 0) must NOT fire CertExpiringSoon (review HIGH: 0-time()<14d)
  - interval: 1m
    input_series:
      - series: 'probe_ssl_earliest_cert_expiry{instance="https://orbetra.com"}'
        values: '0+0x65'
    alert_rule_test:
      - eval_time: 61m
        alertname: CertExpiringSoon
        exp_alerts: []

  # WAL archiving failing → critical
  - interval: 1m
    input_series:
      - series: 'pg_stat_archiver_failed_count'
        values: '0+2x20'
    alert_rule_test:
      - eval_time: 16m
        alertname: WalArchiveFailing
        exp_alerts:
          - exp_labels: { severity: critical, component: backups }
            exp_annotations:
              summary: "WAL archiving is FAILING"
              description: "pg_stat_archiver failed_count is rising — archive-push can't reach the repo. WAL will accumulate in pg_wal and eventually stop writes. First response: set archive_command to /bin/true to keep the DB up, then fix the repo (see w7-pgbackrest runbook)."

  # healthy archiver (no failures) → silent
  - interval: 1m
    input_series:
      - series: 'pg_stat_archiver_failed_count'
        values: '0+0x20'
    alert_rule_test:
      - eval_time: 16m
        alertname: WalArchiveFailing
        exp_alerts: []
